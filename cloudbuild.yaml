steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_VAPID_KEY=${_NEXT_PUBLIC_FIREBASE_VAPID_KEY}'
      - '-t'
      - '${_IMAGE}'
      - '.'
  # Push explícito ANTES do deploy: o campo `images:` no fim deste arquivo só
  # empurra a imagem depois que TODOS os steps terminam, então sem isso o
  # `gcloud run deploy` abaixo pegaria a tag antiga em cache (foi o que causou
  # o incidente de login em 2026-07-22: o deploy "novo" continuava publicando
  # a imagem quebrada anterior, sem erro nenhum).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_IMAGE}'
      - '--region=${_REGION}'
      - '--quiet'
images:
  - '${_IMAGE}'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _SERVICE: venafit-frontend
  _REGION: us-east1
  _IMAGE: 'us-east1-docker.pkg.dev/venafit-78329/cloud-run-source-deploy/venafit-frontend:latest'
